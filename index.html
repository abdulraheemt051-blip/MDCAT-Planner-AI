<!DOCTYPE html>
<html>
<head>
    <title>MDCAT AI Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>MDCAT AI Platform</h1>

    <!-- Feature Buttons -->
    <div class="features">
        <button onclick="sendToAI('mcq')">📝 MCQs</button>
        <button onclick="sendToAI('planner')">📅 Planner</button>
        <button onclick="sendToAI('ai')">🤖 AI</button>
    </div>

    <!-- Output Box -->
    <div id="output"></div>

    <!-- Chat Input -->
    <input type="text" id="userInput" placeholder="Type your question..." />
    <button onclick="askAI()">Send</button>

    <!-- Chat Area -->
    <div id="chat"></div>

    <script src="script.js"></script>

</body>
</html>
